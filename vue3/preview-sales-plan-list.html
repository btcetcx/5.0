<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>海南傲为 ERP 销售计划预览</title>
    <link rel="stylesheet" href="./src/styles/tokens.css" />
    <link rel="stylesheet" href="./src/styles/aw-console.css" />
    <style>
      .aw-form-grid { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:14px; }
      .aw-field label { display:block; color:var(--aw-fg-3); font-size:12px; margin-bottom:6px; }
      .aw-field .aw-switch-line { display:inline-flex; align-items:center; gap:8px; height:34px; margin-bottom:0; color:var(--aw-fg-2); font-size:13px; }
      .aw-field .aw-switch-line.mini { height:28px; }
      .aw-field .aw-switch-line input { position:absolute; width:auto; height:auto; padding:0; border:0; opacity:0; pointer-events:none; }
      .aw-field label.req::after { content:" *"; color:var(--aw-danger); }
      .aw-rich-preview { color:var(--aw-fg-2); font-size:13px; line-height:1.9; }
      .aw-rich-preview p { margin:0 0 8px; }
      .aw-kpi-grid { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:12px; margin-bottom:14px; }
      .aw-form-summary { display:flex; gap:24px; margin-top:10px; color:var(--aw-fg-2); font-size:13px; }
      .aw-form-summary strong { color:var(--aw-danger); }
      .aw-help-dot { display:inline-flex; align-items:center; justify-content:center; width:16px; height:16px; margin-left:4px; border-radius:50%; background:var(--aw-fill-2); color:var(--aw-fg-3); font-size:12px; font-weight:600; cursor:help; }
      .aw-modal-close { border:0; background:transparent; font-size:18px; cursor:pointer; }
      @media (max-width: 900px) { .aw-form-grid, .aw-kpi-grid { grid-template-columns:1fr; } }
    </style>
  </head>
  <body>
    <div data-screen-label="ERP Console">
      <div class="aw-topbar">
        <div class="brand">海南傲为智慧</div>
        <div class="tabs">
          <span class="tab">PRD</span><span class="tab">研发</span><span class="tab">采购</span>
          <a class="tab on" href="./preview-framework.html">销售</a>
          <span class="tab">售后</span><span class="tab">仓储</span><span class="tab">生产</span><span class="tab">质检</span><span class="tab">财务</span><span class="tab">人力</span><span class="tab">设置</span>
        </div>
        <div class="right"><button class="ic aw-top-help" type="button">?</button><div class="av">老</div><span>老大</span></div>
      </div>

      <div class="aw-shell">
        <aside class="aw-side">
          <h4>销售中心</h4>
          <a class="item" href="./preview-framework.html"><span class="dot"></span> 工作台</a>
          <a class="item" href="./preview-customer-list.html"><span class="dot"></span> 客户管理</a>
          <div class="item on" data-flyout-trigger="salesPlan"><span class="dot"></span> 销售计划</div>
          <a class="item" href="./preview-sales-basic-list.html?type=quotes"><span class="dot"></span> 报价管理</a>
          <a class="item" href="./preview-sales-basic-list.html?type=contracts"><span class="dot"></span> 合同管理</a>
          <a class="item" href="./preview-sales-basic-list.html?type=orders"><span class="dot"></span> 订单管理</a>
          <div class="item"><span class="dot"></span> 销售退货</div>
          <div class="item"><span class="dot"></span> 销售换货</div>
          <div class="item"><span class="dot"></span> 销售报表</div>

          <div class="aw-flyout" data-flyout="salesPlan" style="top:126px;display:none">
            <div class="aw-flyout-sec">
              <div class="aw-flyout-h">计划管理</div>
              <div class="aw-flyout-items"><a href="./preview-sales-plan-list.html?action=new">添加计划</a><a href="./preview-sales-plan-list.html">计划列表</a></div>
            </div>
            <div class="aw-flyout-sec">
              <div class="aw-flyout-h">计划设置</div>
              <div class="aw-flyout-items">
                <a href="./preview-sales-plan-list.html?setting=fields">计划自定义字段</a>
                <a href="./preview-sales-plan-list.html?setting=numbers">计划自定义编号</a>
                <a href="./preview-sales-plan-list.html?setting=approvals">计划审批设置</a>
                <a href="./preview-sales-plan-list.html?setting=strategies">计划策略设置</a>
                <a href="./preview-sales-plan-list.html?setting=print">设置计划打印模板</a>
              </div>
            </div>
          </div>
        </aside>

        <main class="aw-main">
          <div class="aw-page-head"><span class="aw-page-title">销售计划</span></div>
          <div id="screen"></div>
        </main>
      </div>
      <button class="aw-float-help" type="button">?</button>
    </div>

    <script>
      const plans = [
        { id:"plan_001", name:"Q2 高精度伺服电机销售计划", code:"SPP-202605001", product:"高精度伺服电机", cycle:"2026-04-01 ~ 2026-06-30", owner:"销售一部 / 李文涛", qty:120, amount:720000, doneQty:68, doneAmount:408000, rate:57, status:"执行中", tone:"blue" },
        { id:"plan_002", name:"华南半成品物料专项计划", code:"SPP-202605002", product:"半成品物料", cycle:"2026-05-01 ~ 2026-05-31", owner:"销售二部 / 陈思源", qty:500, amount:25000, doneQty:360, doneAmount:18000, rate:72, status:"执行中", tone:"blue" },
        { id:"plan_003", name:"重点客户铝合金型材计划", code:"SPP-202605003", product:"铝合金型材", cycle:"2026-05-15 ~ 2026-07-15", owner:"人员 / 赵强", qty:800, amount:25600, doneQty:800, doneAmount:25600, rate:100, status:"已完成", tone:"green" },
        { id:"plan_004", name:"渠道客户包装材料计划", code:"SPP-202605004", product:"外箱包装", cycle:"2026-06-01 ~ 2026-06-30", owner:"渠道组 / 苏婉清", qty:2000, amount:9000, doneQty:0, doneAmount:0, rate:0, status:"未开始", tone:"gray" }
      ];
      const products = [
        { productCode:"P-HM-450", productName:"高精度伺服电机", model:"HM-450", unit:"台", price:"6000.00" },
        { productCode:"P-SEMI-001", productName:"半成品物料", model:"HM-451", unit:"KG", price:"50.00" },
        { productCode:"P-AL-6061", productName:"铝合金型材", model:"AL-6061", unit:"KG", price:"32.00" }
      ];
      const salesRows = [
        ["SO-20260517001","傲为","高精度伺服电机","李文涛",18,108000,"2026-05-04","已发货"],
        ["SO-20260517008","深圳市启明科技有限公司","高精度伺服电机","李文涛",25,150000,"2026-05-11","生产中"],
        ["SO-20260517116","广州明德贸易有限公司","高精度伺服电机","陈思源",25,150000,"2026-05-16","已确认"]
      ];
      const params = new URLSearchParams(location.search);
      const root = document.querySelector("#screen");
      const money = (v) => Number(v || 0).toLocaleString("zh-CN");
      const esc = (v) => String(v ?? "").replace(/[&<>"']/g, (s) => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[s]));

      function renderList() {
        root.innerHTML = `
          <div class="aw-list-layout aw-list-layout-no-tree"><section class="aw-list-panel">
            <div class="aw-list-toolbar">
              <div class="aw-toolbar-left"><div class="aw-search"><span class="aw-line-icon line-search"></span><input id="planSearch" placeholder="全局搜索（如计划名称、产品、负责人）" /></div></div>
              <div class="aw-toolbar-right">
                <button class="aw-refresh-action" type="button"><span class="aw-line-icon line-refresh"></span>刷新数据</button>
                <button class="aw-tool-btn" type="button"><span class="aw-line-icon line-filter"></span>筛选</button>
                <button class="aw-tool-btn" type="button"><span class="aw-line-icon line-columns"></span>字段配置</button>
                <button class="aw-tool-btn" type="button"><span class="aw-line-icon line-upload"></span>导入</button>
                <button class="aw-tool-btn" type="button"><span class="aw-line-icon line-download"></span>导出</button>
                <a class="aw-btn primary" href="./preview-sales-plan-list.html?action=new"><span class="aw-line-icon line-plus"></span>添加计划</a>
              </div>
            </div>
            <div class="aw-doc-tbl-wrap"><div class="aw-doc-tbl-inner"><table class="aw-doc-tbl">
              <thead><tr>
                <th class="aw-check-col aw-sticky-left-1"><label class="aw-check"><input id="checkAllTop" type="checkbox" /><span></span></label></th>
                <th class="aw-index-col aw-sticky-left-2"><div class="aw-th-inner">序号</div></th>
                <th style="width:240px"><div class="aw-th-inner">计划名称</div></th><th style="width:150px"><div class="aw-th-inner">计划编号</div></th>
                <th style="width:180px"><div class="aw-th-inner">计划产品</div></th><th style="width:210px"><div class="aw-th-inner">计划周期</div></th>
                <th style="width:150px"><div class="aw-th-inner">负责对象</div></th><th style="width:110px"><div class="aw-th-inner">目标数量</div></th>
                <th style="width:120px"><div class="aw-th-inner">目标金额</div></th>
                <th style="width:120px"><div class="aw-th-inner">完成金额</div></th><th style="width:100px"><div class="aw-th-inner">达成率</div></th>
                <th style="width:100px"><div class="aw-th-inner">计划状态</div></th><th class="aw-sticky-right" style="width:90px"><div class="aw-th-inner">操作</div></th>
              </tr></thead><tbody id="planRows"></tbody>
            </table></div></div>
            <div class="aw-list-footer"><div class="aw-footer-left">
              <label class="aw-check"><input id="checkAllBottom" type="checkbox" /><span></span></label>
              <span id="planTotal"></span><span id="selectedTotal">已选 0 条</span>
              <button class="aw-bulk-btn" type="button">批量指定</button><button class="aw-bulk-btn" type="button">批量提交</button>
            </div><div class="aw-pagination"><button type="button">上一页</button><button class="on" type="button">1</button><button type="button">2</button><button type="button">3</button><button type="button">下一页</button></div></div>
          </section></div>`;
        bindList();
      }

      function bindList() {
        const tbody = document.querySelector("#planRows");
        const search = document.querySelector("#planSearch");
        const total = document.querySelector("#planTotal");
        const selectedTotal = document.querySelector("#selectedTotal");
        const checkAllTop = document.querySelector("#checkAllTop");
        const checkAllBottom = document.querySelector("#checkAllBottom");
        const selected = new Set();
        const visibleRows = () => plans.filter((row) => !search.value.trim() || Object.values(row).join(" ").includes(search.value.trim()));
        function sync(rows) {
          const visibleSelected = rows.filter((row) => selected.has(row.id)).length;
          selectedTotal.textContent = `已选 ${visibleSelected} 条`;
          [checkAllTop, checkAllBottom].forEach((box) => {
            box.checked = rows.length > 0 && visibleSelected === rows.length;
            box.indeterminate = visibleSelected > 0 && visibleSelected < rows.length;
          });
        }
        function renderRows() {
          const rows = visibleRows();
          tbody.innerHTML = rows.map((row, index) => `
            <tr>
              <td class="aw-check-col aw-sticky-left-1"><label class="aw-check"><input class="row-check" data-key="${row.id}" type="checkbox" ${selected.has(row.id) ? "checked" : ""} /><span></span></label></td>
              <td class="aw-num aw-index-col aw-sticky-left-2">${index + 1}</td>
              <td><a class="aw-link" href="./preview-sales-plan-list.html?id=${row.id}">${esc(row.name)}</a></td><td>${row.code}</td><td>${esc(row.product)}</td><td>${row.cycle}</td><td>${esc(row.owner)}</td>
              <td class="aw-num">${row.qty}</td><td class="aw-num">${money(row.amount)}</td><td class="aw-num">${money(row.doneAmount)}</td>
              <td><span class="aw-status ${row.rate >= 100 ? "green" : row.rate > 0 ? "blue" : "gray"}">${row.rate}%</span></td>
              <td><span class="aw-status ${row.tone}">${row.status}</span></td><td class="aw-action-col aw-sticky-right"><a class="aw-link" href="./preview-sales-plan-list.html?id=${row.id}">查看</a></td>
            </tr>`).join("");
          total.textContent = `共 ${rows.length} 条`;
          tbody.querySelectorAll(".row-check").forEach((box) => box.addEventListener("change", () => {
            box.checked ? selected.add(box.dataset.key) : selected.delete(box.dataset.key);
            sync(rows);
          }));
          sync(rows);
        }
        [checkAllTop, checkAllBottom].forEach((box) => box.addEventListener("change", () => {
          visibleRows().forEach((row) => box.checked ? selected.add(row.id) : selected.delete(row.id));
          renderRows();
        }));
        search.addEventListener("input", renderRows);
        renderRows();
      }

      function renderCreate() {
        root.innerHTML = `
          <div class="aw-form-page">
            <section class="aw-detail-toolbar"><a class="aw-back-btn" href="./preview-sales-plan-list.html"><span class="aw-line-icon line-back"></span>返回计划列表</a><div class="aw-detail-actions"><button class="aw-tool-btn">保存草稿</button><button class="aw-tool-btn">重置</button><button class="aw-btn primary">提交审批</button></div></section>
            <section class="aw-form-card"><div class="aw-detail-section-title">基础信息</div><div class="aw-form-grid">
              ${field("计划名称","请输入销售计划名称",true)}${field("计划编号","自动生成",false,true)}${field('计划状态 <span class="aw-help-dot" title="新增销售计划默认待审批；审批通过后进入未开始或执行跟踪，执行中、暂停和关闭由后续动作推进。">?</span>',"待审批",false,true)}
              ${field("计划开始日期","请选择",true)}${field("计划结束日期","请选择",true)}${selectField("统计口径",["按订单确认","按发货","按回款"])}
              ${selectField("指定方式",["销售部门","具体人员"],true)}${selectField("销售部门",["销售一部","销售二部","渠道组","华南大区"])}${selectField("销售人员",["请选择","李文涛","陈思源","赵强","苏婉清"])}
              ${selectField("客户范围",["全部客户","重点客户","战略客户","渠道客户"])}${field("考核权重","如 30%")}${field("预警阈值","如 低于 70% 预警")}
            </div></section>
            <section class="aw-form-card"><div class="aw-detail-section-title">计划产品</div><div class="aw-doc-tbl-wrap"><div class="aw-doc-tbl-inner"><table class="aw-doc-tbl">
              <thead><tr><th>序号</th><th>产品编号</th><th>产品名称</th><th>规格型号</th><th>单位</th><th>目标数量</th><th>计划单价</th><th>目标金额</th><th>计划交付月</th><th>操作</th></tr></thead><tbody id="detailRows"></tbody>
            </table></div></div><button class="aw-tool-btn" id="openPicker" type="button" style="margin-top:10px">新增明细</button><div class="aw-form-summary" id="summary"></div></section>
            <section class="aw-form-card"><div class="aw-detail-section-title">计划详情</div><textarea class="aw-input" style="min-height:130px" placeholder="请输入计划背景、目标拆解、执行策略、风险说明等信息"></textarea></section>
          </div>
          <div id="pickerHost"></div>`;
        bindCreate();
      }

      function field(label, placeholder, req, readonly) {
        return `<div class="aw-field"><label class="${req ? "req" : ""}">${label}</label><input class="aw-input" ${readonly ? "readonly disabled" : ""} placeholder="${placeholder}" value="${readonly ? placeholder : ""}" /></div>`;
      }
      function selectField(label, options, req) {
        return `<div class="aw-field"><label class="${req ? "req" : ""}">${label}</label><select class="aw-select">${options.map((o) => `<option>${o}</option>`).join("")}</select></div>`;
      }

      function bindCreate() {
        const rows = [];
        const tbody = document.querySelector("#detailRows");
        const summary = document.querySelector("#summary");
        function renderRows() {
          tbody.innerHTML = rows.map((row, index) => `
            <tr><td>${index + 1}</td><td><input class="aw-input" value="${row.productCode}"></td><td><input class="aw-input" value="${row.productName}"></td><td><input class="aw-input" value="${row.model}"></td><td><input class="aw-input" value="${row.unit}"></td>
            <td><input class="aw-input qty" data-i="${index}" value="${row.qty || ""}" placeholder="0"></td><td><input class="aw-input price" data-i="${index}" value="${row.price}" placeholder="0.00"></td><td><input class="aw-input" value="${row.amount || ""}" readonly></td><td><input class="aw-input" value="${row.month || ""}" placeholder="如 2026-06"></td><td><span class="aw-link remove" data-i="${index}" style="color:var(--aw-danger)">删除</span></td></tr>`).join("") || `<tr><td colspan="10" style="text-align:center;color:var(--aw-fg-3);padding:28px 12px">暂无计划产品，点击“新增明细”选择产品</td></tr>`;
          summary.innerHTML = `目标数量：<strong>${rows.reduce((s, r) => s + Number(r.qty || 0), 0)}</strong><span>目标金额：<strong>${money(rows.reduce((s, r) => s + Number(r.amount || 0), 0))}</strong></span>`;
          tbody.querySelectorAll(".qty,.price").forEach((input) => input.addEventListener("input", () => {
            const row = rows[Number(input.dataset.i)];
            row[input.classList.contains("qty") ? "qty" : "price"] = input.value;
            row.amount = Number(row.qty || 0) * Number(row.price || 0);
            renderRows();
          }));
          tbody.querySelectorAll(".remove").forEach((btn) => btn.addEventListener("click", () => { rows.splice(Number(btn.dataset.i), 1); renderRows(); }));
        }
        document.querySelector("#openPicker").addEventListener("click", () => renderPicker((picked) => { rows.push(...picked.map((p) => ({ ...p, qty:"", amount:"", month:"" }))); renderRows(); }));
        renderRows();
      }

      function renderPicker(onConfirm) {
        const host = document.querySelector("#pickerHost");
        const selected = new Set();
        host.innerHTML = `<div class="aw-mask"><div class="aw-modal lg"><div class="head"><strong>选择产品</strong><button class="aw-modal-close" type="button">×</button></div><div class="body"><table class="aw-table"><thead><tr><th>选择</th><th>产品编号</th><th>产品名称</th><th>规格型号</th><th>单位</th><th>计划单价</th></tr></thead><tbody>${products.map((row) => `<tr data-code="${row.productCode}"><td><label class="aw-check"><input type="checkbox"><span></span></label></td><td>${row.productCode}</td><td>${row.productName}</td><td>${row.model}</td><td>${row.unit}</td><td>${row.price}</td></tr>`).join("")}</tbody></table></div><div class="aw-modal-foot"><button class="aw-tool-btn cancel">取消</button><button class="aw-btn primary ok">确定</button></div></div></div>`;
        host.querySelectorAll("tr[data-code]").forEach((tr) => tr.addEventListener("click", () => {
          const code = tr.dataset.code;
          selected.has(code) ? selected.delete(code) : selected.add(code);
          tr.querySelector("input").checked = selected.has(code);
        }));
        host.querySelector(".aw-modal-close").onclick = host.querySelector(".cancel").onclick = () => host.innerHTML = "";
        host.querySelector(".ok").onclick = () => { onConfirm(products.filter((p) => selected.has(p.productCode))); host.innerHTML = ""; };
      }

      function renderDetail() {
        const key = params.get("id") || params.get("planId");
        const plan = plans.find((row) => row.id === key || row.code === key) || plans[0];
        root.innerHTML = `
          <div class="aw-detail-page"><section class="aw-detail-toolbar"><a class="aw-back-btn" href="./preview-sales-plan-list.html"><span class="aw-line-icon line-back"></span>返回</a><div class="aw-detail-actions"><button class="aw-tool-btn">修改</button><button class="aw-tool-btn">提交审批</button><button class="aw-tool-btn">暂停</button><button class="aw-tool-btn">关闭</button><button class="aw-tool-btn">导出</button></div></section>
          <section class="aw-detail-header"><div class="aw-detail-top"><div><div class="aw-detail-title"><h2>${esc(plan.name)}</h2><span class="aw-status ${plan.tone}">${plan.status}</span></div><div class="aw-detail-inline-meta"><span class="aw-detail-code">${plan.code}</span><span>计划周期：<strong>${plan.cycle}</strong></span><span>负责对象：<strong>${esc(plan.owner)}</strong></span><span>达成率：<strong>${plan.rate}%</strong></span></div></div></div></section>
          <section class="aw-card"><div class="aw-detail-tabs"><button class="aw-detail-tab on" data-tab="info">计划信息</button><button class="aw-detail-tab" data-tab="performance">业绩追踪</button><button class="aw-detail-tab" data-tab="sales">销售明细</button><button class="aw-detail-tab" data-tab="logs">操作记录</button></div><div id="detailBody"></div></section></div>`;
        bindDetail(plan);
      }

      function bindDetail(plan) {
        const body = document.querySelector("#detailBody");
        function info() {
          body.innerHTML = `<div class="aw-detail-section-title">基础信息</div><div class="aw-detail-grid">${[
            ["计划名称", plan.name],["计划编号", plan.code],["计划状态", plan.status],["计划产品", plan.product],["计划周期", plan.cycle],["负责对象", plan.owner],["目标数量", plan.qty],["目标金额", money(plan.amount)],["统计口径", "按订单确认"]
          ].map(([k,v]) => `<div class="aw-detail-field"><span>${k}</span><strong>${esc(v)}</strong></div>`).join("")}</div>
          <div class="aw-detail-section-title">计划产品</div><table class="aw-table"><thead><tr><th>产品编号</th><th>产品名称</th><th>目标数量</th><th>目标金额</th><th>完成数量</th><th>完成金额</th><th>达成率</th></tr></thead><tbody><tr><td>P-HM-450</td><td>${esc(plan.product)}</td><td>${plan.qty}</td><td>${money(plan.amount)}</td><td>${plan.doneQty}</td><td>${money(plan.doneAmount)}</td><td>${plan.rate}%</td></tr></tbody></table>

        document.querySelectorAll(".aw-form-card tbody .aw-link:first-child").forEach((node, index) => node.addEventListener("click", () => printModal(index === 0 ? "计划标准打印模板" : "计划审批留痕模板")));
      }

      if (params.get("action") === "new") renderCreate();
      else if (params.get("setting")) renderSetting();
      else if (params.get("id") || params.get("planId")) renderDetail();
      else renderList();

      const triggers = document.querySelectorAll("[data-flyout-trigger]");
      const flyouts = document.querySelectorAll("[data-flyout]");
      let flyoutTimer = null;
      function hideFlyouts() { flyouts.forEach((flyout) => { flyout.style.display = "none"; }); }
      function showFlyout(key, trigger) {
        clearTimeout(flyoutTimer); hideFlyouts();
        const flyout = document.querySelector(`[data-flyout="${key}"]`);
        if (!flyout) return;
        const rect = trigger.getBoundingClientRect();
        flyout.style.top = `${Math.max(52, rect.top + rect.height / 2 - 110)}px`;
        flyout.style.display = "block";
      }
      function scheduleHide() { flyoutTimer = setTimeout(hideFlyouts, 150); }
      triggers.forEach((trigger) => {
        trigger.addEventListener("mouseenter", () => showFlyout(trigger.dataset.flyoutTrigger, trigger));
        trigger.addEventListener("mouseleave", scheduleHide);
      });
      flyouts.forEach((flyout) => {
        flyout.addEventListener("mouseenter", () => clearTimeout(flyoutTimer));
        flyout.addEventListener("mouseleave", scheduleHide);
      });
    </script>
  </body>
</html>
